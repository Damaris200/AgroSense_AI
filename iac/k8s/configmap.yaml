apiVersion: v1
kind: ConfigMap
metadata:
  name: agrosense-config
  namespace: agrosense
data:
  NODE_ENV: "production"

  # Kafka (all services connect to the internal Kafka service)
  KAFKA_BROKERS: "kafka:29092"

  # Inter-service URLs (API Gateway uses these to proxy requests)
  AUTH_SERVICE_URL: "http://auth-service:4001"
  FARM_SERVICE_URL: "http://farm-service:4002"
  WEATHER_SERVICE_URL: "http://weather-service:3003"
  SOIL_SERVICE_URL: "http://soil-service:3004"
  AI_SERVICE_URL: "http://ai-service:4006"
  NOTIFICATION_SERVICE_URL: "http://notification-service:3006"
  ANALYTICS_SERVICE_URL: "http://analytics-service:4007"

  # Auth
  JWT_EXPIRES_IN: "24h"
  # App is served and called through the same ingress IP (same-origin), so CORS
  # rarely triggers. "*" keeps the API reachable when the app is opened by raw IP
  # (no domain).
  CORS_ORIGIN: "*"

  # SMTP (non-secret parts) — Gmail SMTP with an app password (SMTP_PASS is in the secret)
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_USER: "wepngongshalom23@gmail.com"
  SMTP_FROM: "AgroSense AI <wepngongshalom23@gmail.com>"

  # AI
  OPENAI_MODEL: "ft:gpt-4.1-mini-2025-04-14:personal:farm-recommendation:DcEPwNUN"
