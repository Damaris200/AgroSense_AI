# IP-only access (no domain, no TLS):
#   - No `host:` -> this is the default/catch-all server, so it answers on the
#     LoadBalancer's raw IP for ANY Host header.
#   - No `tls:` / cert-manager annotation -> plain HTTP on port 80 (Let's Encrypt
#     cannot issue a certificate for a bare IP address).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agrosense-ingress
  namespace: agrosense
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 4000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
