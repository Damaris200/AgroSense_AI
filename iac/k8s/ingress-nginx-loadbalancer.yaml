# Exposes the NGINX Ingress Controller via a Service of type LoadBalancer.
#
# This reconciles the Service named "ingress-nginx-controller" that the
# upstream ingress-nginx installer creates. Applied separately (not via
# the main kustomization) because the ingress-nginx namespace is owned
# by the upstream installer.
#
# k3s's built-in ServiceLB (Klipper) is DISABLED (see the k3s install flags in
# iac/ansible/roles/k3s/tasks/main.yml). Instead the DigitalOcean Cloud
# Controller Manager watches this Service and provisions a real DO managed Load
# Balancer (visible in the DO dashboard). The LB forwards:
#     LB :80  → node :30080 → ingress-nginx (http)
#     LB :443 → node :30443 → ingress-nginx (https, TLS terminated by
#                              ingress-nginx + cert-manager via TCP passthrough)
#
# Manage the LB by editing this Service — the CCM reconciles the DO LB to match.
# The nodePorts are pinned so the DO cloud firewall can allow exactly these two
# ports from the load balancer.
apiVersion: v1
kind: Service
metadata:
  name: ingress-nginx-controller
  namespace: ingress-nginx
  annotations:
    # Name the LB so it's recognisable in the DO dashboard.
    service.beta.kubernetes.io/do-loadbalancer-name: "agrosense-lb"
  labels:
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/instance: ingress-nginx
    app.kubernetes.io/component: controller
    app.kubernetes.io/part-of: agrosense
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  ipFamilyPolicy: SingleStack
  ipFamilies:
    - IPv4
  selector:
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/instance: ingress-nginx
    app.kubernetes.io/component: controller
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30080
      protocol: TCP
      appProtocol: http
    - name: https
      port: 443
      targetPort: https
      nodePort: 30443
      protocol: TCP
      appProtocol: https
