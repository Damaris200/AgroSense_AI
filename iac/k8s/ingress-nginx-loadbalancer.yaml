# Exposes the NGINX Ingress Controller via a Service of type LoadBalancer.
#
# This reconciles the Service named "ingress-nginx-controller" that the
# upstream ingress-nginx installer creates. Applied separately (not via
# the main kustomization) because the ingress-nginx namespace is owned
# by the upstream installer.
#
# On k3s the built-in ServiceLB (Klipper) binds host ports 80/443 directly
# to this Service, so the cluster is reachable from the public network
# without a host-level Nginx in front. On a cloud provider with a CCM
# (e.g. DigitalOcean, AWS, GCP), a real managed load balancer is
# provisioned instead.
#
# Port conflict: Klipper cannot bind 80/443 if the host Nginx is also
# listening on them. Disable the host Nginx (systemctl disable --now nginx)
# before switching to this LoadBalancer.
apiVersion: v1
kind: Service
metadata:
  name: ingress-nginx-controller
  namespace: ingress-nginx
  labels:
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/instance: ingress-nginx
    app.kubernetes.io/component: controller
    app.kubernetes.io/part-of: agrosense
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  ipFamilyPolicy: SingleStack
  ipFamilies:
    - IPv4
  selector:
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/instance: ingress-nginx
    app.kubernetes.io/component: controller
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
      appProtocol: http
    - name: https
      port: 443
      targetPort: https
      protocol: TCP
      appProtocol: https
