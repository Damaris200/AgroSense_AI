# Exposes the NGINX Ingress Controller on the droplet's OWN IP.
#
# k3s's built-in ServiceLB (Klipper) handles this Service of type LoadBalancer:
# it runs a small per-node pod that binds host ports 80 and 443 directly on the
# droplet. Traffic flows:
#     droplet :80  -> ingress-nginx (http)
#     droplet :443 -> ingress-nginx (https)
# Open the app at  http://<droplet-ip>/  — no external/managed load balancer,
# no DNS, and no LB health checks to go "unhealthy".
apiVersion: v1
kind: Service
metadata:
  name: ingress-nginx-controller
  namespace: ingress-nginx
  labels:
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/instance: ingress-nginx
    app.kubernetes.io/component: controller
    app.kubernetes.io/part-of: agrosense
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/instance: ingress-nginx
    app.kubernetes.io/component: controller
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: https
      port: 443
      targetPort: https
      protocol: TCP
