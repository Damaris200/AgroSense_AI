# Kubernetes Secrets for AgroSense AI
#
# THIS FILE IS A TEMPLATE. Every value below is a placeholder.
# Real secrets live in iac/ansible/group_vars/agrosense_vps/vault.yml (gitignored).
# The Ansible `agrosense` role creates the real `agrosense-secrets` K8s Secret
# imperatively from vault.yml — this YAML is never `kubectl apply`-ed in CI/CD.
#
# Only use this file if you want to apply a Secret manually for local k3s testing:
#   1. Fill in real values
#   2. kubectl apply -f iac/k8s/secrets.yaml -n agrosense
#   3. RESET the file back to placeholders before committing
#
# Database topology (polyglot persistence, free-tier managed):
#   * Neon Postgres (1 project, 2 databases)     → auth, farm
#   * MongoDB Atlas M0 (1 cluster, 5 databases)  → weather, soil, ai, notification, analytics
#
apiVersion: v1
kind: Secret
metadata:
  name: agrosense-secrets
  namespace: agrosense
type: Opaque
stringData:
  # ── Relational (Neon Postgres) ─────────────────────────────────────────────
  AUTH_DATABASE_URL: "postgresql://USER:PASSWORD@HOST.neon.tech/auth_db?sslmode=require"
  FARM_DATABASE_URL: "postgresql://USER:PASSWORD@HOST.neon.tech/farm_db?sslmode=require"

  # ── Document (MongoDB Atlas) ───────────────────────────────────────────────
  WEATHER_DATABASE_URL: "mongodb+srv://USER:PASSWORD@CLUSTER.mongodb.net/weather_db?retryWrites=true&w=majority"
  SOIL_DATABASE_URL: "mongodb+srv://USER:PASSWORD@CLUSTER.mongodb.net/soil_db?retryWrites=true&w=majority"
  AI_DATABASE_URL: "mongodb+srv://USER:PASSWORD@CLUSTER.mongodb.net/ai_db?retryWrites=true&w=majority"
  NOTIFICATION_DATABASE_URL: "mongodb+srv://USER:PASSWORD@CLUSTER.mongodb.net/notification_db?retryWrites=true&w=majority"
  ANALYTICS_DATABASE_URL: "mongodb+srv://USER:PASSWORD@CLUSTER.mongodb.net/analytics_db?retryWrites=true&w=majority"

  # ── Auth ───────────────────────────────────────────────────────────────────
  JWT_SECRET: "REPLACE_ME"

  # ── External APIs ──────────────────────────────────────────────────────────
  OPENAI_API_KEY: "REPLACE_ME"
  TOMORROW_API_KEY: "REPLACE_ME"

  # ── SMTP ───────────────────────────────────────────────────────────────────
  SMTP_PASS: "REPLACE_ME"
