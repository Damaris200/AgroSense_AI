# Kubernetes Secrets for AgroSense AI
#
# IMPORTANT: Replace every REPLACE_ME value before applying to any real environment.
# In CI/CD, the Ansible playbook creates this secret via ansible-vault
# (see iac/ansible/roles/agrosense/tasks/main.yml) so this file is never applied directly.
#
# To apply manually:
#   kubectl apply -f iac/k8s/secrets.yaml -n agrosense
#
apiVersion: v1
kind: Secret
metadata:
  name: agrosense-secrets
  namespace: agrosense
type: Opaque
stringData:
  # PostgreSQL
  POSTGRES_PASSWORD: "agrosense_dev"
  AUTH_DATABASE_URL: "postgresql://agrosense:agrosense_dev@postgres:5432/auth_db"
  FARM_DATABASE_URL: "postgresql://agrosense:agrosense_dev@postgres:5432/farm_db"
  WEATHER_DATABASE_URL: "postgresql://agrosense:agrosense_dev@postgres:5432/weather_db"
  SOIL_DATABASE_URL: "postgresql://agrosense:agrosense_dev@postgres:5432/soil_db"
  AI_DATABASE_URL: "postgresql://agrosense:agrosense_dev@postgres:5432/ai_db"
  NOTIFICATION_DATABASE_URL: "postgresql://agrosense:agrosense_dev@postgres:5432/notification_db"
  ANALYTICS_DATABASE_URL: "postgresql://agrosense:agrosense_dev@postgres:5432/analytics_db"

  # Auth
  JWT_SECRET: "REPLACE_ME"

  # External APIs — fill in before deploying
  OPENAI_API_KEY: "REPLACE_ME"
  TOMORROW_API_KEY: "REPLACE_ME"

  # SMTP
  SMTP_PASS: "REPLACE_ME"
