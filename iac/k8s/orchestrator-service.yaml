# The orchestrator holds per-submission state in a plain in-memory Map.
# It MUST stay at replicas: 1 — multiple replicas would split state across pods
# and submissions would never complete (each pod has a different partial view).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator-service
  namespace: agrosense
  labels:
    app: orchestrator-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator-service
  strategy:
    # Recreate (not RollingUpdate) to avoid two instances running simultaneously
    type: Recreate
  template:
    metadata:
      labels:
        app: orchestrator-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4005"
        prometheus.io/path: "/health"
    spec:
      automountServiceAccountToken: false
      containers:
        - name: orchestrator-service
          image: damarisateh/agrosense-orchestrator:v1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 4005
          env:
            - name: PORT
              value: "4005"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: agrosense-config
                  key: NODE_ENV
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: agrosense-config
                  key: KAFKA_BROKERS
            - name: KAFKA_CLIENT_ID
              value: "orchestrator-service"
            - name: KAFKA_GROUP_ID
              value: "orchestrator-service-group"
          # No HTTP liveness/readiness probes — the orchestrator is a pure Kafka
          # consumer with no HTTP server. The "starting on port 4005" log line is
          # misleading; the code never actually calls listen(4005). If the bun
          # process dies, the container dies and Kubernetes restarts it — that
          # is sufficient liveness signal for a single-replica consumer.
          # If you ever add an HTTP /health endpoint to orchestrator-service,
          # re-add probes here pointing to that path.
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
              ephemeral-storage: "256Mi"
            limits:
              memory: "256Mi"
              cpu: "200m"
              ephemeral-storage: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator-service
  namespace: agrosense
spec:
  selector:
    app: orchestrator-service
  ports:
    - port: 4005
      targetPort: 4005
  type: ClusterIP
