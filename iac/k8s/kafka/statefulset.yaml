apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: agrosense
  labels:
    app: kafka
spec:
  serviceName: kafka-headless
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      terminationGracePeriodSeconds: 60
      automountServiceAccountToken: false
      # Disable Kubernetes service-env-injection. Without this, kubelet injects
      # KAFKA_PORT=tcp://<cluster-ip>:9092 (from the kafka Service) which
      # Confluent's configure script mistakes for the legacy `port` setting,
      # prints "port is deprecated", and silently exits — Kafka never launches.
      enableServiceLinks: false
      initContainers:
        - name: kraft-format
          image: confluentinc/cp-kafka:7.6.0
          command:
            - /bin/bash
            - -ec
            - |
              kafka-storage format \
                --ignore-formatted \
                --cluster-id "$CLUSTER_ID" \
                --config /etc/kafka/kraft.properties
          env:
            - name: CLUSTER_ID
              valueFrom:
                secretKeyRef:
                  name: kafka-kraft
                  key: cluster-id
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
            - name: kraft-config
              mountPath: /etc/kafka/kraft.properties
              subPath: kraft.properties
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.6.0
          ports:
            - name: plaintext-host
              containerPort: 9092
            - name: plaintext
              containerPort: 29092
            - name: controller
              containerPort: 9093
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@kafka-0.kafka-headless.agrosense.svc.cluster.local:9093"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_LOG_DIRS
              value: "/var/lib/kafka/data"
            - name: KAFKA_LOG_RETENTION_HOURS
              value: "168"
            # Shrink JVM heap so the broker fits in a 2Gi container limit
            # alongside the rest of k3s on a 4vCPU/8GB DO Droplet. Without
            # this, cp-kafka defaults to -Xmx1G -Xms1G and OOMs on startup.
            - name: KAFKA_HEAP_OPTS
              value: "-Xmx768m -Xms256m"
            - name: CLUSTER_ID
              valueFrom:
                secretKeyRef:
                  name: kafka-kraft
                  key: cluster-id
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: 29092
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              memory: "1Gi"
              cpu: "200m"
              ephemeral-storage: "512Mi"
            limits:
              memory: "2Gi"
              cpu: "500m"
              ephemeral-storage: "2Gi"
      volumes:
        - name: kraft-config
          configMap:
            name: kafka-kraft-config
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
