apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: agrosense
  labels:
    app: analytics-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: analytics-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4007"
        prometheus.io/path: "/health"
    spec:
      automountServiceAccountToken: false
      containers:
        - name: analytics-service
          image: damarisateh/agrosense-analytics:v1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 4007
          env:
            - name: PORT
              value: "4007"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: agrosense-config
                  key: NODE_ENV
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: agrosense-config
                  key: KAFKA_BROKERS
            - name: KAFKA_CLIENT_ID
              value: "analytics-service"
            - name: KAFKA_GROUP_ID
              value: "analytics-service-group"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: agrosense-secrets
                  key: ANALYTICS_DATABASE_URL
          livenessProbe:
            tcpSocket:
              port: 4007
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: 4007
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
              ephemeral-storage: "256Mi"
            limits:
              memory: "256Mi"
              cpu: "200m"
              ephemeral-storage: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: agrosense
spec:
  selector:
    app: analytics-service
  ports:
    - port: 4007
      targetPort: 4007
  type: ClusterIP
