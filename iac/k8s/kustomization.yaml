apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Deploy everything:  kubectl apply -k iac/k8s/
# Deploy monitoring:  kubectl apply -k iac/k8s/monitoring/

resources:
  - namespace.yaml
  - configmap.yaml
  - secrets.yaml

  # Infrastructure
  - postgres/statefulset.yaml
  - postgres/service.yaml
  - kafka/kraft-configmap.yaml
  - kafka/statefulset.yaml
  - kafka/service.yaml

  # Application services
  - auth-service.yaml
  - api-gateway.yaml
  - farm-service.yaml
  - weather-service.yaml
  - soil-service.yaml
  - orchestrator-service.yaml
  - ai-service.yaml
  - notification-service.yaml
  - analytics-service.yaml
  - frontend.yaml

  # Routing & scaling
  - ingress.yaml
  - hpa.yaml
  - cert-manager.yaml
