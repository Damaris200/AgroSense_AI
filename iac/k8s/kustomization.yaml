apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Two-phase deploy (namespace must exist and be Active first):
#   kubectl apply -f iac/k8s/namespace.yaml
#   kubectl wait --for=jsonpath='{.status.phase}'=Active --timeout=30s namespace/agrosense
#   kubectl apply -k iac/k8s/
#
# Same pattern for monitoring:
#   kubectl apply -f iac/k8s/monitoring/namespace.yaml
#   kubectl wait --for=jsonpath='{.status.phase}'=Active --timeout=30s namespace/monitoring
#   kubectl apply -k iac/k8s/monitoring/
#
# namespace.yaml is intentionally NOT listed below so namespaced resources
# cannot be submitted before the namespace is Active.

namespace: agrosense

resources:
  - configmap.yaml
  - secrets.yaml

  # Infrastructure
  # Postgres + MongoDB are managed externally (Neon + MongoDB Atlas).
  # Only Kafka is self-hosted on this cluster.
  - kafka/kraft-configmap.yaml
  - kafka/statefulset.yaml
  - kafka/service.yaml

  # Application services
  - auth-service.yaml
  - api-gateway.yaml
  - farm-service.yaml
  - weather-service.yaml
  - soil-service.yaml
  - orchestrator-service.yaml
  - ai-service.yaml
  - notification-service.yaml
  - analytics-service.yaml
  - frontend.yaml

  # Routing & scaling
  - ingress.yaml
  - hpa.yaml
  - cert-manager.yaml
