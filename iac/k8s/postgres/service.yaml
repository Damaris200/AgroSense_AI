# Headless service — required by the StatefulSet for stable pod DNS
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  namespace: agrosense
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
# Regular ClusterIP service — used in DATABASE_URL by all application services
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: agrosense
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
