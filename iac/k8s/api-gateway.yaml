apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: agrosense
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: api-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4000"
        prometheus.io/path: "/health"
    spec:
      automountServiceAccountToken: false
      containers:
        - name: api-gateway
          image: damarisateh/agrosense-api-gateway:v1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: "4000"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: agrosense-config
                  key: NODE_ENV
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: agrosense-config
                  key: CORS_ORIGIN
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: agrosense-config
                  key: KAFKA_BROKERS
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: agrosense-config
                  key: AUTH_SERVICE_URL
            - name: FARM_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: agrosense-config
                  key: FARM_SERVICE_URL
            - name: WEATHER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: agrosense-config
                  key: WEATHER_SERVICE_URL
            - name: SOIL_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: agrosense-config
                  key: SOIL_SERVICE_URL
            - name: AI_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: agrosense-config
                  key: AI_SERVICE_URL
            - name: NOTIFICATION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: agrosense-config
                  key: NOTIFICATION_SERVICE_URL
            - name: ANALYTICS_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: agrosense-config
                  key: ANALYTICS_SERVICE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: agrosense-secrets
                  key: JWT_SECRET
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
              ephemeral-storage: "256Mi"
            limits:
              memory: "256Mi"
              cpu: "200m"
              ephemeral-storage: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: agrosense
spec:
  selector:
    app: api-gateway
  ports:
    - port: 4000
      targetPort: 4000
  type: ClusterIP
