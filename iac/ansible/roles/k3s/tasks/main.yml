---
- name: Download k3s install script
  get_url:
    url: https://get.k3s.io
    dest: /tmp/install-k3s.sh
    mode: "0755"

- name: Install k3s (single-node; Traefik + built-in ServiceLB disabled, external cloud provider)
  # --disable servicelb + --disable-cloud-controller turn off k3s's built-in
  # Klipper load balancer and embedded cloud controller so the DigitalOcean CCM
  # (installed below) can provision a real managed LB instead. cloud-provider=external
  # makes the kubelet wait for the CCM to initialise the node.
  shell: /tmp/install-k3s.sh
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
    INSTALL_K3S_EXEC: "server --disable traefik --disable servicelb --disable-cloud-controller --kubelet-arg cloud-provider=external --write-kubeconfig-mode 644"
  args:
    creates: /usr/local/bin/k3s

- name: Wait for k3s API server to become reachable
  wait_for:
    host: 127.0.0.1
    port: 6443
    delay: 10
    timeout: 90

# ── DigitalOcean Cloud Controller Manager ──────────────────────────────────────
# The CCM watches Services of type LoadBalancer and provisions a real DO managed
# LB (visible in the DO dashboard) to match. It must run before the node can be
# initialised, since `--kubelet-arg cloud-provider=external` taints the node
# `node.cloudprovider.kubernetes.io/uninitialized` until the CCM removes it.

- name: Verify DigitalOcean API token is set in vault (not a placeholder)
  assert:
    that:
      - vault_do_api_token is defined and vault_do_api_token | length > 0 and 'REPLACE_ME' not in vault_do_api_token
    fail_msg: >
      vault_do_api_token is missing or still a placeholder. Add a read+write
      DigitalOcean API token to group_vars/agrosense_vps/vault.yml — the CCM
      uses it to create and manage the load balancer.

- name: Create digitalocean API token secret for the CCM (kube-system)
  shell: |
    kubectl -n kube-system create secret generic digitalocean \
      --from-literal=access-token="{{ vault_do_api_token }}" \
      --kubeconfig=/etc/rancher/k3s/k3s.yaml \
      --dry-run=client -o yaml \
    | kubectl apply -f - --kubeconfig=/etc/rancher/k3s/k3s.yaml
  no_log: true
  changed_when: true

- name: Install DigitalOcean Cloud Controller Manager (pinned v0.1.67)
  shell: >
    kubectl apply -f
    https://raw.githubusercontent.com/digitalocean/digitalocean-cloud-controller-manager/master/releases/digitalocean-cloud-controller-manager/v0.1.67.yml
    --kubeconfig=/etc/rancher/k3s/k3s.yaml
  changed_when: true

- name: Wait for node to be Ready
  shell: kubectl get node --kubeconfig=/etc/rancher/k3s/k3s.yaml -o jsonpath='{.items[0].status.conditions[-1].type}'
  register: node_status
  until: node_status.stdout == "Ready"
  retries: 12
  delay: 10
  changed_when: false

- name: Install NGINX Ingress Controller
  shell: >
    kubectl apply -f
    https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.0/deploy/static/provider/cloud/deploy.yaml
    --kubeconfig=/etc/rancher/k3s/k3s.yaml
  changed_when: true

- name: Wait for NGINX Ingress Controller pod to be ready
  shell: >
    kubectl wait --namespace ingress-nginx
    --for=condition=ready pod
    --selector=app.kubernetes.io/component=controller
    --timeout=120s
    --kubeconfig=/etc/rancher/k3s/k3s.yaml
  changed_when: false

- name: Copy ingress-nginx LoadBalancer manifest to VPS
  copy:
    src: "{{ playbook_dir }}/../k8s/ingress-nginx-loadbalancer.yaml"
    dest: /tmp/ingress-nginx-loadbalancer.yaml
    mode: "0644"

- name: Expose ingress-nginx via a Service of type LoadBalancer
  shell: >
    kubectl apply
    -f /tmp/ingress-nginx-loadbalancer.yaml
    --kubeconfig=/etc/rancher/k3s/k3s.yaml
  changed_when: true

- name: Wait for ingress-nginx LoadBalancer to receive an external IP
  shell: >
    kubectl get svc ingress-nginx-controller -n ingress-nginx
    -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
    --kubeconfig=/etc/rancher/k3s/k3s.yaml
  register: ingress_lb_ip
  until: ingress_lb_ip.stdout | length > 0
  retries: 24
  delay: 5
  changed_when: false

- name: Install cert-manager (required for Let's Encrypt TLS)
  shell: >
    kubectl apply -f
    https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
    --kubeconfig=/etc/rancher/k3s/k3s.yaml
  changed_when: true

- name: Wait for cert-manager to be ready
  shell: >
    kubectl wait --namespace cert-manager
    --for=condition=ready pod
    --selector=app.kubernetes.io/instance=cert-manager
    --timeout=120s
    --kubeconfig=/etc/rancher/k3s/k3s.yaml
  changed_when: false

- name: Install metrics-server (required for HPA)
  shell: >
    kubectl apply -f
    https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
    --kubeconfig=/etc/rancher/k3s/k3s.yaml
  changed_when: true

- name: Fetch kubeconfig for local kubectl access
  slurp:
    src: /etc/rancher/k3s/k3s.yaml
  register: kubeconfig_raw

- name: Save kubeconfig locally (replaces 127.0.0.1 with VPS IP)
  copy:
    content: "{{ kubeconfig_raw.content | b64decode | replace('127.0.0.1', ansible_host) }}"
    dest: "{{ lookup('env', 'HOME') }}/.kube/agrosense-k3s.yaml"
    mode: "0600"
  delegate_to: localhost
  become: no
