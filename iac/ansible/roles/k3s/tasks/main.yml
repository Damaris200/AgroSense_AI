---
- name: Download k3s install script
  get_url:
    url: https://get.k3s.io
    dest: /tmp/install-k3s.sh
    mode: "0755"

- name: Install k3s (single-node; Traefik disabled, built-in ServiceLB/Klipper ENABLED)
  # Klipper (k3s's built-in ServiceLB) is left enabled on purpose: it binds host
  # ports 80/443 on the droplet for the ingress-nginx LoadBalancer Service, so the
  # app is reached directly at http://<droplet-ip>/ — NO external DigitalOcean load
  # balancer, and therefore none of its health-check (healthy/unhealthy) problems.
  shell: /tmp/install-k3s.sh
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
    INSTALL_K3S_EXEC: "server --disable traefik --write-kubeconfig-mode 644"
  args:
    creates: /usr/local/bin/k3s

- name: Wait for k3s API server to become reachable
  wait_for:
    host: 127.0.0.1
    port: 6443
    delay: 10
    timeout: 90

# No DigitalOcean Cloud Controller Manager / managed LB. Klipper (built-in
# ServiceLB) serves the ingress-nginx LoadBalancer Service on the droplet's own
# ports 80/443, so there is no external LB to provision or health-check.

- name: Wait for node to be Ready
  shell: kubectl get node --kubeconfig=/etc/rancher/k3s/k3s.yaml -o jsonpath='{.items[0].status.conditions[-1].type}'
  register: node_status
  until: node_status.stdout == "Ready"
  retries: 12
  delay: 10
  changed_when: false

- name: Install NGINX Ingress Controller
  shell: >
    kubectl apply -f
    https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.0/deploy/static/provider/cloud/deploy.yaml
    --kubeconfig=/etc/rancher/k3s/k3s.yaml
  register: ingress_install
  until: ingress_install.rc == 0
  retries: 5
  delay: 10
  changed_when: true

- name: Wait for the ingress-nginx controller Deployment to be created
  # `kubectl wait` errors with "no matching resources found" if it runs before the
  # pod object exists. First retry until the Deployment is present...
  shell: kubectl get deployment ingress-nginx-controller -n ingress-nginx --kubeconfig=/etc/rancher/k3s/k3s.yaml
  register: ingress_deploy
  until: ingress_deploy.rc == 0
  retries: 24
  delay: 5
  changed_when: false

- name: Wait for NGINX Ingress Controller to be ready (rollout)
  # ...then use rollout status, which waits for the pods to come up and does not
  # error when they are still being scheduled.
  shell: >
    kubectl rollout status deployment/ingress-nginx-controller
    -n ingress-nginx --timeout=180s
    --kubeconfig=/etc/rancher/k3s/k3s.yaml
  register: ingress_ready
  until: ingress_ready.rc == 0
  retries: 6
  delay: 10
  changed_when: false

- name: Copy ingress-nginx LoadBalancer manifest to VPS
  copy:
    src: "{{ playbook_dir }}/../k8s/ingress-nginx-loadbalancer.yaml"
    dest: /tmp/ingress-nginx-loadbalancer.yaml
    mode: "0644"

- name: Expose ingress-nginx via a Service of type LoadBalancer
  shell: >
    kubectl apply
    -f /tmp/ingress-nginx-loadbalancer.yaml
    --kubeconfig=/etc/rancher/k3s/k3s.yaml
  changed_when: true

- name: Wait for ingress-nginx LoadBalancer to receive an external IP (best-effort)
  # Non-fatal: even if the Service status never reports an IP, ingress-nginx is
  # already serving on the droplet's ports 80/443 via Klipper, so the app works.
  shell: >
    kubectl get svc ingress-nginx-controller -n ingress-nginx
    -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
    --kubeconfig=/etc/rancher/k3s/k3s.yaml
  register: ingress_lb_ip
  until: ingress_lb_ip.stdout | length > 0
  retries: 18
  delay: 5
  changed_when: false
  failed_when: false

# cert-manager and the upstream metrics-server are intentionally NOT installed:
#   - No TLS (IP-only HTTP) => cert-manager would be unused failure surface.
#   - k3s already bundles metrics-server, which is enough for the HPA.

- name: Fetch kubeconfig for local kubectl access
  slurp:
    src: /etc/rancher/k3s/k3s.yaml
  register: kubeconfig_raw

- name: Ensure local ~/.kube directory exists
  file:
    path: "{{ lookup('env', 'HOME') }}/.kube"
    state: directory
    mode: "0755"
  delegate_to: localhost
  become: no

- name: Save kubeconfig locally (replaces 127.0.0.1 with VPS IP)
  copy:
    content: "{{ kubeconfig_raw.content | b64decode | replace('127.0.0.1', ansible_host) }}"
    dest: "{{ lookup('env', 'HOME') }}/.kube/agrosense-k3s.yaml"
    mode: "0600"
  delegate_to: localhost
  become: no
