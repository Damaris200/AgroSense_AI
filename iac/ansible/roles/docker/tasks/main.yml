---
- name: Check if Docker is already installed and working
  command: docker version
  register: docker_check
  changed_when: false
  failed_when: false

- name: Full Docker cleanup (remove all conflicting sources and keys)
  shell: |
    find /etc/apt/sources.list.d/ -name "*docker*" -delete 2>/dev/null || true
    find /etc/apt/sources.list.d/ -name "*download_docker*" -delete 2>/dev/null || true
    rm -f /etc/apt/keyrings/docker.asc /etc/apt/keyrings/docker.gpg
    apt-key list 2>/dev/null \
      | grep -B1 -i "docker" \
      | grep "      " \
      | awk '{print $NF}' \
      | xargs -r apt-key del 2>/dev/null || true
    apt clean
  changed_when: true
  when: docker_check.rc != 0

- name: Install prerequisites
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: yes
  when: docker_check.rc != 0

- name: Create keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  when: docker_check.rc != 0

- name: Download Docker GPG key
  shell: |
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
      | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    chmod 644 /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg
  when: docker_check.rc != 0

- name: Add Docker apt repository
  shell: |
    echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] \
    https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" \
    > /etc/apt/sources.list.d/docker.list
  changed_when: true
  when: docker_check.rc != 0

- name: Install Docker Engine
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes
  when: docker_check.rc != 0

- name: Enable and start Docker daemon
  systemd:
    name: docker
    enabled: yes
    state: started

- name: Verify Docker is working
  command: docker version
  changed_when: false
