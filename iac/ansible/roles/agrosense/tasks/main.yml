---
- name: Create K8s manifests directory on VPS
  file:
    path: "{{ k8s_manifests_dest }}"
    state: directory
    mode: "0755"

- name: Copy K8s manifests to VPS
  synchronize:
    src: "{{ playbook_dir }}/../k8s/"
    dest: "{{ k8s_manifests_dest }}/"
    delete: yes
    rsync_opts:
      - "--exclude=secrets.yaml" # secrets are created imperatively from vault

- name: Create agrosense namespace
  shell: >
    kubectl create namespace {{ app_namespace }}
    --dry-run=client -o yaml
    --kubeconfig=/etc/rancher/k3s/k3s.yaml
    | kubectl apply -f - --kubeconfig=/etc/rancher/k3s/k3s.yaml
  changed_when: true

- name: Wait for agrosense namespace to be Active
  shell: >
    kubectl wait --for=jsonpath='{.status.phase}'=Active
    --timeout=30s namespace/{{ app_namespace }}
    --kubeconfig=/etc/rancher/k3s/k3s.yaml
  changed_when: false

- name: Create monitoring namespace
  shell: >
    kubectl create namespace {{ monitoring_namespace }}
    --dry-run=client -o yaml
    --kubeconfig=/etc/rancher/k3s/k3s.yaml
    | kubectl apply -f - --kubeconfig=/etc/rancher/k3s/k3s.yaml
  changed_when: true

- name: Wait for monitoring namespace to be Active
  shell: >
    kubectl wait --for=jsonpath='{.status.phase}'=Active
    --timeout=30s namespace/{{ monitoring_namespace }}
    --kubeconfig=/etc/rancher/k3s/k3s.yaml
  changed_when: false

# Pre-flight: assert every secret is defined AND not a placeholder.
# Naming each variable individually so the failure message tells you exactly
# which one is missing or still set to "USER:PASSWORD@HOST".
- name: Verify all vault secrets are real values (not placeholders)
  assert:
    that:
      - vault_jwt_secret is defined and vault_jwt_secret | length > 0
      - vault_openai_api_key is defined and vault_openai_api_key | length > 0 and 'REPLACE_ME' not in vault_openai_api_key
      - vault_tomorrow_api_key is defined and vault_tomorrow_api_key | length > 0 and 'REPLACE_ME' not in vault_tomorrow_api_key
      - vault_smtp_pass is defined and vault_smtp_pass | length > 0 and 'REPLACE_ME' not in vault_smtp_pass
      - vault_neon_auth_database_url is defined and 'USER:PASSWORD' not in vault_neon_auth_database_url
      - vault_neon_farm_database_url is defined and 'USER:PASSWORD' not in vault_neon_farm_database_url
      - vault_mongodb_weather_url is defined and 'USER:PASSWORD' not in vault_mongodb_weather_url
      - vault_mongodb_soil_url is defined and 'USER:PASSWORD' not in vault_mongodb_soil_url
      - vault_mongodb_ai_url is defined and 'USER:PASSWORD' not in vault_mongodb_ai_url
      - vault_mongodb_notification_url is defined and 'USER:PASSWORD' not in vault_mongodb_notification_url
      - vault_mongodb_analytics_url is defined and 'USER:PASSWORD' not in vault_mongodb_analytics_url
    fail_msg: >
      One of the vault_* variables is missing, empty, or still set to a
      placeholder. Edit group_vars/agrosense_vps/vault.yml and replace every
      "USER:PASSWORD@HOST.neon.tech" / "USER:PASSWORD@CLUSTER.mongodb.net"
      / "REPLACE_ME" with your real Neon + Atlas connection strings and API keys.

# Create the agrosense-secrets K8s Secret from an env file.
# Database URLs point at managed providers (Neon + MongoDB Atlas), not a local PG.
# `no_log` is OFF here for debugging; flip back to true once Ansible is happy.
- name: Write agrosense-secrets env file
  copy:
    dest: /tmp/agrosense-secrets.env
    mode: "0600"
    content: |
      JWT_SECRET={{ vault_jwt_secret }}
      OPENAI_API_KEY={{ vault_openai_api_key }}
      TOMORROW_API_KEY={{ vault_tomorrow_api_key }}
      SMTP_PASS={{ vault_smtp_pass }}
      AUTH_DATABASE_URL={{ vault_neon_auth_database_url }}
      FARM_DATABASE_URL={{ vault_neon_farm_database_url }}
      WEATHER_DATABASE_URL={{ vault_mongodb_weather_url }}
      SOIL_DATABASE_URL={{ vault_mongodb_soil_url }}
      AI_DATABASE_URL={{ vault_mongodb_ai_url }}
      NOTIFICATION_DATABASE_URL={{ vault_mongodb_notification_url }}
      ANALYTICS_DATABASE_URL={{ vault_mongodb_analytics_url }}
  no_log: false

- name: Create agrosense-secrets from env file
  shell: |
    kubectl create secret generic agrosense-secrets \
      --namespace={{ app_namespace }} \
      --from-env-file=/tmp/agrosense-secrets.env \
      --kubeconfig=/etc/rancher/k3s/k3s.yaml \
      --dry-run=client -o yaml \
    | kubectl apply -f - --kubeconfig=/etc/rancher/k3s/k3s.yaml
  no_log: true
  changed_when: true

- name: Remove agrosense-secrets env file
  file:
    path: /tmp/agrosense-secrets.env
    state: absent
  no_log: true

- name: Create grafana-admin secret in monitoring namespace
  shell: |
    kubectl create secret generic grafana-admin \
      --namespace={{ monitoring_namespace }} \
      --from-literal=admin-user="admin" \
      --from-literal=admin-password="{{ vault_grafana_password }}" \
      --kubeconfig=/etc/rancher/k3s/k3s.yaml \
      --dry-run=client -o yaml \
    | kubectl apply -f - --kubeconfig=/etc/rancher/k3s/k3s.yaml
  no_log: true
  changed_when: true

# Kafka runs in KRaft mode (no ZooKeeper). The broker reads CLUSTER_ID from
# this Secret at startup; the same value MUST persist across pod restarts or
# the broker will refuse to start with InconsistentClusterIdException.
# Override `kafka_kraft_cluster_id` in vault.yml with a value generated by:
#   docker run --rm confluentinc/cp-kafka:7.6.0 kafka-storage random-uuid
- name: Create kafka-kraft cluster ID secret
  shell: |
    kubectl create secret generic kafka-kraft \
      --namespace={{ app_namespace }} \
      --from-literal=cluster-id="{{ kafka_kraft_cluster_id | default('MkU3OEVBNTcwNTJENDM2Qk') }}" \
      --kubeconfig=/etc/rancher/k3s/k3s.yaml \
      --dry-run=client -o yaml \
    | kubectl apply -f - --kubeconfig=/etc/rancher/k3s/k3s.yaml
  no_log: true
  changed_when: true

- name: Apply agrosense K8s manifests (namespace already created above)
  shell: |
    kubectl apply \
      --kubeconfig=/etc/rancher/k3s/k3s.yaml \
      -f {{ k8s_manifests_dest }}/configmap.yaml \
      -f {{ k8s_manifests_dest }}/kafka/ \
      -f {{ k8s_manifests_dest }}/auth-service.yaml \
      -f {{ k8s_manifests_dest }}/api-gateway.yaml \
      -f {{ k8s_manifests_dest }}/farm-service.yaml \
      -f {{ k8s_manifests_dest }}/weather-service.yaml \
      -f {{ k8s_manifests_dest }}/soil-service.yaml \
      -f {{ k8s_manifests_dest }}/orchestrator-service.yaml \
      -f {{ k8s_manifests_dest }}/ai-service.yaml \
      -f {{ k8s_manifests_dest }}/notification-service.yaml \
      -f {{ k8s_manifests_dest }}/analytics-service.yaml \
      -f {{ k8s_manifests_dest }}/frontend.yaml \
      -f {{ k8s_manifests_dest }}/ingress.yaml \
      -f {{ k8s_manifests_dest }}/hpa.yaml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: true

- name: Apply monitoring manifests
  shell: kubectl apply -k {{ k8s_manifests_dest }}/monitoring/ --kubeconfig=/etc/rancher/k3s/k3s.yaml
  changed_when: true

- name: Wait for core deployments to roll out
  shell: |
    kubectl rollout status deployment/api-gateway  -n {{ app_namespace }} --timeout=300s --kubeconfig=/etc/rancher/k3s/k3s.yaml
    kubectl rollout status deployment/auth-service -n {{ app_namespace }} --timeout=300s --kubeconfig=/etc/rancher/k3s/k3s.yaml
    kubectl rollout status deployment/frontend     -n {{ app_namespace }} --timeout=300s --kubeconfig=/etc/rancher/k3s/k3s.yaml
  changed_when: false
