---
- name: Create K8s manifests directory on VPS
  file:
    path: "{{ k8s_manifests_dest }}"
    state: directory
    mode: "0755"

- name: Copy K8s manifests to VPS
  synchronize:
    src: "{{ playbook_dir }}/../k8s/"
    dest: "{{ k8s_manifests_dest }}/"
    delete: yes
    rsync_opts:
      - "--exclude=secrets.yaml" # secrets are created imperatively from vault

- name: Create agrosense namespace
  shell: >
    kubectl create namespace {{ app_namespace }}
    --dry-run=client -o yaml
    --kubeconfig=/etc/rancher/k3s/k3s.yaml
    | kubectl apply -f - --kubeconfig=/etc/rancher/k3s/k3s.yaml
  changed_when: true

- name: Create monitoring namespace
  shell: >
    kubectl create namespace {{ monitoring_namespace }}
    --dry-run=client -o yaml
    --kubeconfig=/etc/rancher/k3s/k3s.yaml
    | kubectl apply -f - --kubeconfig=/etc/rancher/k3s/k3s.yaml
  changed_when: true

# Create the agrosense-secrets K8s Secret from an env file to avoid shell quoting issues.
- name: Write agrosense-secrets env file
  copy:
    dest: /tmp/agrosense-secrets.env
    mode: "0600"
    content: |
      POSTGRES_PASSWORD={{ vault_db_password }}
      JWT_SECRET={{ vault_jwt_secret }}
      OPENAI_API_KEY={{ vault_openai_api_key }}
      TOMORROW_API_KEY={{ vault_tomorrow_api_key }}
      SMTP_PASS={{ vault_smtp_pass }}
      AUTH_DATABASE_URL=postgresql://agrosense:{{ vault_db_password }}@postgres:5432/auth_db
      FARM_DATABASE_URL=postgresql://agrosense:{{ vault_db_password }}@postgres:5432/farm_db
      WEATHER_DATABASE_URL=postgresql://agrosense:{{ vault_db_password }}@postgres:5432/weather_db
      SOIL_DATABASE_URL=postgresql://agrosense:{{ vault_db_password }}@postgres:5432/soil_db
      AI_DATABASE_URL=postgresql://agrosense:{{ vault_db_password }}@postgres:5432/ai_db
      NOTIFICATION_DATABASE_URL=postgresql://agrosense:{{ vault_db_password }}@postgres:5432/notification_db
      ANALYTICS_DATABASE_URL=postgresql://agrosense:{{ vault_db_password }}@postgres:5432/analytics_db
  no_log: true

- name: Create agrosense-secrets from env file
  shell: |
    kubectl create secret generic agrosense-secrets \
      --namespace={{ app_namespace }} \
      --from-env-file=/tmp/agrosense-secrets.env \
      --kubeconfig=/etc/rancher/k3s/k3s.yaml \
      --dry-run=client -o yaml \
    | kubectl apply -f - --kubeconfig=/etc/rancher/k3s/k3s.yaml
  no_log: true
  changed_when: true

- name: Remove agrosense-secrets env file
  file:
    path: /tmp/agrosense-secrets.env
    state: absent
  no_log: true

- name: Create grafana-admin secret in monitoring namespace
  shell: |
    kubectl create secret generic grafana-admin \
      --namespace={{ monitoring_namespace }} \
      --from-literal=admin-user="admin" \
      --from-literal=admin-password="{{ vault_grafana_password }}" \
      --kubeconfig=/etc/rancher/k3s/k3s.yaml \
      --dry-run=client -o yaml \
    | kubectl apply -f - --kubeconfig=/etc/rancher/k3s/k3s.yaml
  no_log: true
  changed_when: true

# Kafka runs in KRaft mode (no ZooKeeper). The broker reads CLUSTER_ID from
# this Secret at startup; the same value MUST persist across pod restarts or
# the broker will refuse to start with InconsistentClusterIdException.
# Override `kafka_kraft_cluster_id` in vault.yml with a value generated by:
#   docker run --rm confluentinc/cp-kafka:7.6.0 kafka-storage random-uuid
- name: Create kafka-kraft cluster ID secret
  shell: |
    kubectl create secret generic kafka-kraft \
      --namespace={{ app_namespace }} \
      --from-literal=cluster-id="{{ kafka_kraft_cluster_id | default('MkU3OEVBNTcwNTJENDM2Qk') }}" \
      --kubeconfig=/etc/rancher/k3s/k3s.yaml \
      --dry-run=client -o yaml \
    | kubectl apply -f - --kubeconfig=/etc/rancher/k3s/k3s.yaml
  no_log: true
  changed_when: true

- name: Apply agrosense K8s manifests (excluding secrets.yaml)
  shell: |
    kubectl apply \
      --kubeconfig=/etc/rancher/k3s/k3s.yaml \
      -f {{ k8s_manifests_dest }}/namespace.yaml \
      -f {{ k8s_manifests_dest }}/configmap.yaml \
      -f {{ k8s_manifests_dest }}/postgres/ \
      -f {{ k8s_manifests_dest }}/kafka/ \
      -f {{ k8s_manifests_dest }}/auth-service.yaml \
      -f {{ k8s_manifests_dest }}/api-gateway.yaml \
      -f {{ k8s_manifests_dest }}/farm-service.yaml \
      -f {{ k8s_manifests_dest }}/weather-service.yaml \
      -f {{ k8s_manifests_dest }}/soil-service.yaml \
      -f {{ k8s_manifests_dest }}/orchestrator-service.yaml \
      -f {{ k8s_manifests_dest }}/ai-service.yaml \
      -f {{ k8s_manifests_dest }}/notification-service.yaml \
      -f {{ k8s_manifests_dest }}/analytics-service.yaml \
      -f {{ k8s_manifests_dest }}/frontend.yaml \
      -f {{ k8s_manifests_dest }}/ingress.yaml \
      -f {{ k8s_manifests_dest }}/hpa.yaml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: true

- name: Apply monitoring manifests
  shell: kubectl apply -k {{ k8s_manifests_dest }}/monitoring/ --kubeconfig=/etc/rancher/k3s/k3s.yaml
  changed_when: true

- name: Wait for core deployments to roll out
  shell: |
    kubectl rollout status deployment/api-gateway  -n {{ app_namespace }} --timeout=300s --kubeconfig=/etc/rancher/k3s/k3s.yaml
    kubectl rollout status deployment/auth-service -n {{ app_namespace }} --timeout=300s --kubeconfig=/etc/rancher/k3s/k3s.yaml
    kubectl rollout status deployment/frontend     -n {{ app_namespace }} --timeout=300s --kubeconfig=/etc/rancher/k3s/k3s.yaml
  changed_when: false
