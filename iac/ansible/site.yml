---
# AgroSense AI — full VPS provisioning playbook
#
# Usage:
#   ansible-playbook -i inventory.ini site.yml --ask-vault-pass
#
# Roles applied in order:
#   1. common     — system updates, essential packages, UFW firewall
#   2. docker     — Docker Engine (needed to pull/run images locally if required)
#   3. k3s        — single-node Kubernetes + NGINX Ingress + DigitalOcean CCM
#   4. agrosense  — create K8s secrets from vault, deploy all manifests
#
# The host-level Nginx role was removed: traffic now flows DO managed LB →
# node NodePort (30080/30443) → ingress-nginx, so a host reverse proxy on
# 80/443 is redundant (it also previously conflicted with the LB on those ports).

- name: Provision AgroSense AI VPS
  hosts: agrosense_vps
  become: yes
  gather_facts: yes

  vars_files:
    - group_vars/agrosense_vps/vars.yml
    - group_vars/agrosense_vps/vault.yml

  roles:
    - common
    - docker
    - k3s
    - agrosense
