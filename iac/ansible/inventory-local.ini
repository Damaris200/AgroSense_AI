# Use this inventory when running the playbook DIRECTLY ON the VPS
# (Ansible installed on the droplet itself — no SSH, local connection).
#
# ── ACTION REQUIRED ───────────────────────────────────────────────────────────
# Replace <VPS_PUBLIC_IP> with the droplet's real public IP. It is NOT used to
# connect (the connection is local); it is only stamped into the saved kubeconfig
# and the printed access URLs so they show the right address.

[agrosense_vps]
localhost ansible_connection=local ansible_host=164.92.179.117

[all:vars]
ansible_python_interpreter=/usr/bin/python3
