[defaults]
# Don't block on the interactive "accept host key?" prompt during a live run.
host_key_checking = False
retry_files_enabled = False
# Give slow first-boot droplets room before timing out a connection.
timeout = 60
interpreter_python = /usr/bin/python3
deprecation_warnings = False
force_color = True
# Show task timing so you can narrate the demo.
callbacks_enabled = profile_tasks

[ssh_connection]
# Faster task execution and resilient long-lived SSH connections.
pipelining = True
ssh_args = -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o ControlMaster=auto -o ControlPersist=600s -o StrictHostKeyChecking=no
