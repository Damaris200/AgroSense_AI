# AgroSense AI — Ansible inventory
#
# ── ACTION REQUIRED ───────────────────────────────────────────────────────────
# Replace <NEW_VPS_IP> below with your NEW DigitalOcean droplet's public IPv4.
#
# `ansible_host` MUST be set: the k3s role rewrites the fetched kubeconfig with
# this value (replace 127.0.0.1 -> ansible_host), and site.yml targets the
# `agrosense_vps` group. Previously this file only had a `[vps]` group, so
# `ansible-playbook ... site.yml` matched NO hosts and did nothing.

[agrosense_vps]
agrosense ansible_host=<NEW_VPS_IP> ansible_user=root ansible_ssh_private_key_file=~/.ssh/id_ed25519

# Legacy group, kept only so the older docker-compose playbook.yml still resolves
# a host. The supported path is site.yml against agrosense_vps.
[vps]
agrosense

[all:vars]
ansible_python_interpreter=/usr/bin/python3
