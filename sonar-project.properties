sonar.projectKey=Damaris200_AgroSense_AI
sonar.organization=damaris200
sonar.host.url=https://sonarcloud.io
sonar.projectName=AgroSense AI
sonar.projectVersion=1.0

# ── Source roots ───────────────────────────────────────────────────────────────
sonar.sources=.

# ── Exclusions ─────────────────────────────────────────────────────────────────
sonar.exclusions=\
  **/node_modules/**,\
  **/coverage/**,\
  **/.scannerwork/**,\
  **/.sonar-scanner/**,\
  **/*.d.ts,\
  **/prisma/migrations/**,\
  **/prisma/seed.ts,\
  **/dist/**,\
  **/build/**,\
  **/junit.xml

# ── Test locations ─────────────────────────────────────────────────────────────
sonar.test.inclusions=\
  **/__tests__/**/*.ts,\
  **/__tests__/**/*.tsx,\
  **/tests/**/*.ts

# ── TypeScript / JavaScript analysis ──────────────────────────────────────────
sonar.javascript.file.suffixes=.js,.jsx
sonar.typescript.file.suffixes=.ts,.tsx

# ── LCOV coverage report paths ─────────────────────────────────────────────────
# Only the 5 services that have test stages in the Jenkinsfile.
# Generated by: bun test --coverage --coverage-reporter=lcov  (per service)
sonar.javascript.lcov.reportPaths=\
  services/api-gateway/coverage/lcov.info,\
  services/auth-service/coverage/lcov.info,\
  services/weather-service/coverage/lcov.info,\
  services/soil-service/coverage/lcov.info,\
  services/notification-service/coverage/lcov.info,\
  services/analytics-service/coverage/lcov.info,\
  services/orchestrator-service/coverage/lcov.info,\
  frontend/coverage/lcov.info

# ── Coverage exclusions ────────────────────────────────────────────────────────
# Skip files that aren't unit-testable in isolation: entry points, type-only
# files, env config (just parses process.env), and infra glue (Kafka producers,
# Prisma clients). Also excludes the two services that don't yet have test
# suites (farm-service, ai-service) — they're still analysed for code smells
# and vulnerabilities, just not counted toward the coverage gate.
sonar.coverage.exclusions=\
  **/src/index.ts,\
  **/src/main.tsx,\
  **/src/App.tsx,\
  **/src/config/**,\
  **/src/types/**,\
  **/src/models/**,\
  **/src/kafka/**,\
  **/src/events/**,\
  **/src/services/**,\
  **/src/utils/logger.ts,\
  **/src/utils/passkey.ts,\
  **/src/hooks/**,\
  **/src/controllers/**,\
  services/farm-service/src/**,\
  services/ai-service/src/**
  
  
