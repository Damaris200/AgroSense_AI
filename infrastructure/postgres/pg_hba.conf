# AgroSense AI — pg_hba.conf for local Docker Compose development only
# All connections use trust auth within the private Docker network.
# Replace with md5 or scram-sha-256 for any internet-facing deployment.

# TYPE  DATABASE        USER            ADDRESS                 METHOD
local   all             all                                     trust
host    all             all             127.0.0.1/32            trust
host    all             all             ::1/128                 trust
host    all             all             172.16.0.0/12           trust
host    all             all             10.0.0.0/8              trust
