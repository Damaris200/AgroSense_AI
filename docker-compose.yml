version: '3.9'

networks:
  agrosense-net:
    driver: bridge

volumes:
  postgres_data:

services:

  # ── Infrastructure ────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: agrosense-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agrosense
      POSTGRES_PASSWORD: agrosense_dev
      POSTGRES_DB: postgres        # default DB; real DBs created by init script
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro
      - ./infrastructure/postgres/schemas:/schemas:ro
    networks:
      - agrosense-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U agrosense']
      interval: 5s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: agrosense-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - agrosense-net
    healthcheck:
      test: ['CMD-SHELL', 'nc -z localhost 2181']
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: agrosense-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    networks:
      - agrosense-net
    healthcheck:
      test: ['CMD-SHELL', 'kafka-broker-api-versions --bootstrap-server localhost:9092']
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Services ─────────────────────────────────────────────────────────────────
  # Only auth-service is implemented. Uncomment each service as you build it.

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: agrosense-auth
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4001
      DATABASE_URL: postgresql://agrosense:agrosense_dev@postgres:5432/auth_db
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_EXPIRES_IN: 24h
      CORS_ORIGIN: http://localhost:5173
    ports:
      - '4001:4001'
    networks:
      - agrosense-net
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:4001/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5

