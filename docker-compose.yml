version: '3.9'

networks:
  agrosense-net:
    driver: bridge

volumes:
  postgres_data:

services:

  # ── Infrastructure ────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: agrosense-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agrosense
      POSTGRES_PASSWORD: agrosense_dev
      POSTGRES_DB: farm_db
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_INITDB_ARGS: "--auth-host=trust --auth-local=trust"
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro
      - ./infrastructure/postgres/schemas:/schemas:ro
    networks:
      - agrosense-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U agrosense -d postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: agrosense-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - agrosense-net
    healthcheck:
      test: ['CMD-SHELL', 'nc -z localhost 2181']
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: agrosense-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    networks:
      - agrosense-net
    healthcheck:
      test: ['CMD-SHELL', 'kafka-broker-api-versions --bootstrap-server localhost:9092']
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Application Services ──────────────────────────────────────────────────────

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: agrosense-auth
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4001
      DATABASE_URL: postgresql://agrosense:agrosense_dev@postgres:5432/auth_db
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_EXPIRES_IN: 24h
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    ports:
      - '4001:4001'
    networks:
      - agrosense-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4001/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: agrosense-api-gateway
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: production
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      AUTH_SERVICE_URL: http://auth-service:4001
      FARM_SERVICE_URL: http://farm-service:4002
      WEATHER_SERVICE_URL: http://weather-service:3003
      SOIL_SERVICE_URL: http://soil-service:3004
      AI_SERVICE_URL: http://ai-service:4006
      NOTIFICATION_SERVICE_URL: http://notification-service:3006
      ANALYTICS_SERVICE_URL: http://analytics-service:4007
      KAFKA_BROKERS: kafka:29092
    networks:
      - agrosense-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  farm-service:
    build:
      context: ./services/farm-service
      dockerfile: Dockerfile
    container_name: agrosense-farm
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - '4002:4002'
    environment:
      NODE_ENV: production
      PORT: 4002
      DATABASE_URL: postgresql://agrosense:agrosense_dev@postgres:5432/farm_db
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: farm-service
      KAFKA_GROUP_ID: farm-service-group
    networks:
      - agrosense-net

  weather-service:
    build:
      context: ./services/weather-service
      dockerfile: Dockerfile
    container_name: agrosense-weather
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - '3003:3003'
    environment:
      NODE_ENV: production
      PORT: 3003
      DATABASE_URL: postgresql://agrosense:agrosense_dev@postgres:5432/weather_db
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: weather-service
      KAFKA_GROUP_ID: weather-service-group
      TOMORROW_API_KEY: ${TOMORROW_API_KEY}
    networks:
      - agrosense-net

  soil-service:
    build:
      context: ./services/soil-service
      dockerfile: Dockerfile
    container_name: agrosense-soil
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - '3004:3004'
    environment:
      NODE_ENV: production
      PORT: 3004
      DATABASE_URL: postgresql://agrosense:agrosense_dev@postgres:5432/soil_db
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: soil-service
      KAFKA_GROUP_ID: soil-service-group
    networks:
      - agrosense-net

  orchestrator-service:
    build:
      context: ./services/orchestrator-service
      dockerfile: Dockerfile
    container_name: agrosense-orchestrator
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4005
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: orchestrator-service
      KAFKA_GROUP_ID: orchestrator-service-group
    networks:
      - agrosense-net

  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    container_name: agrosense-ai
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - '4006:4006'
    environment:
      NODE_ENV: production
      PORT: 4006
      DATABASE_URL: postgresql://agrosense:agrosense_dev@postgres:5432/ai_db
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: ai-service
      KAFKA_GROUP_ID: ai-service-group
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
    networks:
      - agrosense-net

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: agrosense-notification
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - '3006:3006'
    environment:
      NODE_ENV: production
      PORT: 3006
      DATABASE_URL: postgresql://agrosense:agrosense_dev@postgres:5432/notification_db
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: notification-service
      KAFKA_GROUP_ID: notification-service-group
      SMTP_HOST: ${SMTP_HOST:-smtp.ethereal.email}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM:-AgroSense AI <noreply@agrosense.ai>}
    networks:
      - agrosense-net

  analytics-service:
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
    container_name: agrosense-analytics
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - '4007:4007'
    environment:
      NODE_ENV: production
      PORT: 4007
      DATABASE_URL: postgresql://agrosense:agrosense_dev@postgres:5432/analytics_db
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: analytics-service
      KAFKA_GROUP_ID: analytics-service-group
    networks:
      - agrosense-net

  # ── Frontend ──────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000}
    container_name: agrosense-frontend
    restart: unless-stopped
    depends_on:
      - api-gateway
    ports:
      - '5173:80'
    networks:
      - agrosense-net
