version: '3.9'

services:
  # ── Infrastructure ───────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agrosense
      POSTGRES_PASSWORD: agrosense_dev
      POSTGRES_DB: agrosense_auth
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # ── Services ─────────────────────────────────────────────────────────────────

  auth-service:
    build: ./services/auth-service
    ports:
      - '4001:4001'
    environment:
      DATABASE_URL: postgresql://agrosense:agrosense_dev@postgres:5432/agrosense_auth
      JWT_SECRET: change_me_in_production
      JWT_EXPIRES_IN: 24h
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      - postgres

  # TODO: Uncomment as each service is implemented
  # api-gateway:
  #   build: ./services/api-gateway
  #   ports: ['4000:4000']
  #   depends_on: [kafka, auth-service]

  # farm-service:
  #   build: ./services/farm-service
  #   depends_on: [kafka, postgres]

  # weather-service:
  #   build: ./services/weather-service
  #   depends_on: [kafka]

  # soil-service:
  #   build: ./services/soil-service
  #   depends_on: [kafka]

  # orchestrator-service:
  #   build: ./services/orchestrator-service
  #   depends_on: [kafka]

  # ai-service:
  #   build: ./services/ai-service
  #   depends_on: [kafka]

  # notification-service:
  #   build: ./services/notification-service
  #   depends_on: [kafka]

  # analytics-service:
  #   build: ./services/analytics-service
  #   depends_on: [kafka]

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - '5173:5173'
    depends_on:
      - auth-service

volumes:
  postgres_data:
