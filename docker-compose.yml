networks:
  agrosense-net:
    driver: bridge

volumes:
  jenkins_home:
  kafka_data:
  prometheus_data:
  grafana_data:

services:

  # ── Infrastructure ────────────────────────────────────────────────────────────
  #
  # Postgres is no longer self-hosted. Relational data (auth_db, farm_db) lives on
  # Neon (managed Postgres, free tier). Document data lives on MongoDB Atlas (free
  # M0 cluster). Each service reads its own connection URI from .env — there is
  # no shared local DB container in this compose file by design.

  # KRaft-mode Kafka — no ZooKeeper. The Confluent entrypoint detects
  # KAFKA_PROCESS_ROLES + CLUSTER_ID and auto-formats /var/lib/kafka/data
  # on first boot. The CLUSTER_ID value is intentionally stable across
  # `docker compose down` cycles; changing it requires wiping kafka_data.
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: agrosense-kafka
    restart: always
    ports:
      - '9092:9092'
    environment:
      CLUSTER_ID: "${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - agrosense-net
    healthcheck:
      test: ['CMD-SHELL', 'kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1']
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  # ── Application Services ──────────────────────────────────────────────────────

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    image: damarisateh/agrosense-auth:latest
    container_name: agrosense-auth
    restart: always
    environment:
      NODE_ENV: production
      PORT: 4001
      DATABASE_URL: "${NEON_AUTH_DATABASE_URL:?NEON_AUTH_DATABASE_URL must be set in .env}"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set in .env}"
      JWT_EXPIRES_IN: 24h
      CORS_ORIGIN: http://localhost:5173
    ports:
      - '4001:4001'
    networks:
      - agrosense-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4001/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    image: damarisateh/agrosense-api-gateway:latest
    container_name: agrosense-api-gateway
    restart: always
    depends_on:
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: production
      PORT: 4000
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set in .env}"
      CORS_ORIGIN: http://localhost:5173
      AUTH_SERVICE_URL: http://auth-service:4001
      FARM_SERVICE_URL: http://farm-service:4002
      WEATHER_SERVICE_URL: http://weather-service:3003
      SOIL_SERVICE_URL: http://soil-service:3004
      AI_SERVICE_URL: http://ai-service:4006
      NOTIFICATION_SERVICE_URL: http://notification-service:3006
      ANALYTICS_SERVICE_URL: http://analytics-service:4007
      KAFKA_BROKERS: kafka:29092
    networks:
      - agrosense-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  farm-service:
    build:
      context: ./services/farm-service
      dockerfile: Dockerfile
    image: damarisateh/agrosense-farm:latest
    container_name: agrosense-farm
    restart: always
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4002
      DATABASE_URL: "${NEON_FARM_DATABASE_URL:?NEON_FARM_DATABASE_URL must be set in .env}"
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: farm-service
      KAFKA_GROUP_ID: farm-service-group
    networks:
      - agrosense-net

  weather-service:
    build:
      context: ./services/weather-service
      dockerfile: Dockerfile
    image: damarisateh/agrosense-weather:latest
    container_name: agrosense-weather
    restart: always
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - '3003:3003'
    environment:
      NODE_ENV: production
      PORT: 3003
      DATABASE_URL: "${MONGODB_WEATHER_URL:?MONGODB_WEATHER_URL must be set in .env}"
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: weather-service
      KAFKA_GROUP_ID: weather-service-group
      TOMORROW_API_KEY: "${TOMORROW_API_KEY:?TOMORROW_API_KEY must be set in .env}"
    networks:
      - agrosense-net

  soil-service:
    build:
      context: ./services/soil-service
      dockerfile: Dockerfile
    image: damarisateh/agrosense-soil:latest
    container_name: agrosense-soil
    restart: always
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - '3004:3004'
    environment:
      NODE_ENV: production
      PORT: 3004
      DATABASE_URL: "${MONGODB_SOIL_URL:?MONGODB_SOIL_URL must be set in .env}"
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: soil-service
      KAFKA_GROUP_ID: soil-service-group
    networks:
      - agrosense-net

  orchestrator-service:
    build:
      context: ./services/orchestrator-service
      dockerfile: Dockerfile
    image: damarisateh/agrosense-orchestrator:latest
    container_name: agrosense-orchestrator
    restart: always
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4005
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: orchestrator-service
      KAFKA_GROUP_ID: orchestrator-service-group
    networks:
      - agrosense-net

  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    image: damarisateh/agrosense-ai:latest
    container_name: agrosense-ai
    restart: always
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - '4006:4006'
    environment:
      NODE_ENV: production
      PORT: 4006
      DATABASE_URL: "${MONGODB_AI_URL:?MONGODB_AI_URL must be set in .env}"
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: ai-service
      KAFKA_GROUP_ID: ai-service-group
      OPENAI_API_KEY: "${OPENAI_API_KEY:?OPENAI_API_KEY must be set in .env}"
      OPENAI_MODEL: "${OPENAI_MODEL:-ft:gpt-4.1-mini-2025-04-14:personal:farm-recommendation:DcEPwNUN}"
    networks:
      - agrosense-net

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    image: damarisateh/agrosense-notification:latest
    container_name: agrosense-notification
    restart: always
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - '3006:3006'
    environment:
      NODE_ENV: production
      PORT: 3006
      DATABASE_URL: "${MONGODB_NOTIFICATION_URL:?MONGODB_NOTIFICATION_URL must be set in .env}"
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: notification-service
      KAFKA_GROUP_ID: notification-service-group
      SMTP_HOST: "${SMTP_HOST:-smtp.ethereal.email}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:?SMTP_USER must be set in .env}"
      SMTP_PASS: "${SMTP_PASS:?SMTP_PASS must be set in .env}"
      SMTP_FROM: "${SMTP_FROM:?SMTP_FROM must be set in .env}"
    networks:
      - agrosense-net

  analytics-service:
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
    image: damarisateh/agrosense-analytics:latest
    container_name: agrosense-analytics
    restart: always
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - '4007:4007'
    environment:
      NODE_ENV: production
      PORT: 4007
      DATABASE_URL: "${MONGODB_ANALYTICS_URL:?MONGODB_ANALYTICS_URL must be set in .env}"
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: analytics-service
      KAFKA_GROUP_ID: analytics-service-group
    networks:
      - agrosense-net

  # ── Frontend ──────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Empty base URL → axios uses relative paths like /api/auth/login.
        # The frontend's nginx proxies /api/ to the API gateway, so port 80
        # serves both the SPA and the API behind the same origin.
        VITE_API_BASE_URL: ""
    image: damarisateh/agrosense-frontend:latest
    container_name: agrosense-frontend
    restart: always
    depends_on:
      - api-gateway
    ports:
      - '80:80'
    networks:
      - agrosense-net

  # ── CI ────────────────────────────────────────────────────────────────────────

  jenkins:
    build:
      context: ./iac/docker/jenkins
      dockerfile: Dockerfile
    container_name: jenkins
    restart: always
    group_add:
      - "999"
    ports:
      - '8080:8080'
      - '50000:50000'
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - agrosense-net

  # SonarQube self-hosted service removed — code analysis is now run by the
  # Jenkins pipeline against SonarCloud (https://sonarcloud.io). See
  # sonar-project.properties for project key + organization and Jenkinsfile
  # stage 'SonarCloud Analysis' for the scanner invocation.

  prometheus:
    image: prom/prometheus:latest
    container_name: agrosense-prometheus
    restart: always
    ports:
      - '9090:9090'
    volumes:
      - ./iac/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - agrosense-net

  grafana:
    image: grafana/grafana:latest
    container_name: agrosense-grafana
    restart: always
    ports:
      - '3000:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: agrosense2026
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - agrosense-net
