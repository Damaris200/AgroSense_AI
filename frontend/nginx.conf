server {
  listen 80;

  root /usr/share/nginx/html;
  index index.html;

  # Reverse-proxy API traffic to the gateway. The frontend code uses a
  # relative base URL (VITE_API_BASE_URL is empty), so axios calls land
  # here as /api/... and we forward them to the API gateway container.
  location /api/ {
    proxy_pass http://api-gateway:4000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # Cache hashed static assets aggressively. Vite fingerprints these filenames
  # (e.g. index-COZJEryd.js), so a new build = a new name = safe to cache forever.
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # index.html must NEVER be cached — it references the hashed asset names above.
  # If the browser caches it, it keeps loading the OLD asset names after a deploy
  # (the "I still see the old app" bug). no-store forces a fresh fetch every time.
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    expires -1;
    try_files $uri =404;
  }

  # SPA fallback — all routes serve index.html so React Router works
  location / {
    try_files $uri $uri/ /index.html;
  }
}
